<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ragebait Generator</title>
  <style>
    body {
      font-family: "Trebuchet MS", sans-serif;
      background: #f7f7f7;
      margin: 0;
      padding: 30px 20px;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 24px;
      border: 2px solid #333;
      border-radius: 18px;
      background: white;
      box-sizing: border-box;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 10px;
    }

    p {
      margin-top: 0;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      font-size: 16px;
      padding: 10px;
      box-sizing: border-box;
      margin-bottom: 12px;
      font-family: "Trebuchet MS", sans-serif;
      border: 1px solid #999;
      border-radius: 10px;
      resize: vertical;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      margin: 14px 0;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button {
      padding: 10px 16px;
      font-size: 16px;
      cursor: pointer;
      margin-right: 10px;
      font-family: "Trebuchet MS", sans-serif;
      border-radius: 10px;
      border: 1px solid #888;
      background: #f2f2f2;
    }

    button:hover {
      background: #e8e8e8;
    }

    #output {
      margin-top: 10px;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 12px;
      min-height: 60px;
      white-space: pre-wrap;
      word-wrap: break-word;
      background: #fafafa;
    }

    #copiedMsg {
      color: green;
      font-size: 14px;
      display: none;
      margin-top: 8px;
    }

    .footer {
      margin-top: 20px;
      padding-top: 14px;
      border-top: 1px solid #ddd;
      font-size: 14px;
      color: #555;
    }

    input[type="range"] {
      vertical-align: middle;
    }

    label {
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Ragebait Generator</h1>
    <p>If someone is annoying you, paste their words here and give them the ragebaited text back. Works nearly every time</p>

    <textarea id="inputText" placeholder="Type or paste text here..."></textarea>
    <br />
    <button onclick="generateRagebait()">Generate</button>
    <button onclick="copyOutput()">Copy Output</button>

    <div class="controls">
      <div class="control-group">
        <label for="zestSlider">Zest:</label>
        <input type="range" id="zestSlider" min="0" max="3" value="0" oninput="updateZestValue()" />
        <span id="zestValue">0</span>
      </div>

      <div class="control-group">
        <input type="checkbox" id="quoteToggle" />
        <label for="quoteToggle">Add quotations</label>
      </div>
    </div>

    <div id="output"></div>
    <div id="copiedMsg">Copied!</div>

    <div class="footer">
      <p>Made by zebu4466</p>
    </div>
  </div>

  <script>
    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function updateZestValue() {
      document.getElementById("zestValue").textContent = document.getElementById("zestSlider").value;
    }

    function stripOuterQuotes(text) {
      let trimmed = text.trim();

      if (
        (trimmed.startsWith('"') && trimmed.endsWith('"')) ||
        (trimmed.startsWith("'") && trimmed.endsWith("'"))
      ) {
        trimmed = trimmed.slice(1, -1).trim();
      }

      return trimmed;
    }

    function capitalizeRandomLetters(word) {
      if (word.length <= 1) return word;

      const chars = word.split("");
      const eligible = [];

      for (let i = 1; i < chars.length; i++) {
        if (/[a-zA-Z]/.test(chars[i])) {
          eligible.push(i);
        }
      }

      if (eligible.length === 0) return word;

      const chosen = [];
      const firstPick = eligible[randomInt(0, eligible.length - 1)];
      chosen.push(firstPick);

      for (const i of eligible) {
        if (i === firstPick) continue;

        const isConsecutive = chosen.some(index => Math.abs(index - i) === 1);
        if (!isConsecutive && Math.random() < 0.25) {
          chosen.push(i);
        }
      }

      for (const i of chosen) {
        chars[i] = chars[i].toUpperCase();
      }

      return chars.join("");
    }

    function generateRagebait() {
      let input = document.getElementById("inputText").value;
      const addQuotes = document.getElementById("quoteToggle").checked;
      const zest = parseInt(document.getElementById("zestSlider").value, 10);

      if (addQuotes) {
        input = stripOuterQuotes(input);
      }

      const parts = input.split(/(\s+)/);

      let output = parts.map(part => {
        if (/^\s+$/.test(part) || part === "") return part;
        return capitalizeRandomLetters(part);
      }).join("");

      if (addQuotes) {
        output = `"${output}"`;
      }

      if (zest > 0) {
        output += " " + "💅".repeat(zest);
      }

      document.getElementById("output").textContent = output;
      document.getElementById("copiedMsg").style.display = "none";
    }

    function copyOutput() {
      const text = document.getElementById("output").textContent;
      if (!text) return;

      navigator.clipboard.writeText(text).then(() => {
        const msg = document.getElementById("copiedMsg");
        msg.style.display = "block";

        setTimeout(() => {
          msg.style.display = "none";
        }, 1500);
      });
    }
  </script>
</body>
</html>
