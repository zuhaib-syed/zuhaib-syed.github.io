<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zuhaib Syed</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
  href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Marcellus&family=Old+Standard+TT:wght@400;700&family=UnifrakturCook:wght@700&family=UnifrakturMaguntia&display=swap"
  rel="stylesheet"
>

<style>
    :root {
  /*
    Vintage Goode substitute:
    UnifrakturCook
  */
  --font-heading:
    "UnifrakturCook",
    Georgia,
    serif;

  /*
    Old Standard:
    Google Fonts calls it Old Standard TT.
  */
  --font-body:
    "Old Standard TT",
    Palatino,
    "Palatino Linotype",
    "Book Antiqua",
    serif;

  /*
    Vintage Modern substitute.
  */
  --font-vintage-modern:
    "Cormorant Garamond",
    Palatino,
    "Palatino Linotype",
    serif;

  /*
    Engravers' Old English BT substitute.
  */
  --font-old-english:
    "UnifrakturMaguntia",
    Georgia,
    serif;

  /*
    Zenaida substitute.
  */
  --font-zenaida:
    "Marcellus",
    Palatino,
    "Palatino Linotype",
    serif;
}

* {
  box-sizing: border-box;
}

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
  background-color: #c0a87e;
  background-image: url("assets/background.png");
  background-repeat: repeat-y;
  background-position: top center;
  background-size: 100% auto;

  color: #4c2818;

  /*
    Old Standard TT first.
    Palatino is the last-resort text fallback.
  */
  font-family: var(--font-body);
}

  h1,
h2,
h3,
h4,
h5,
h6 {
  font-family: var(--font-heading);
  font-weight: 700;
  line-height: 1.1;
}

  /*
  Use these classes anywhere in your HTML.
*/

.font-vintage-goode {
  font-family: var(--font-heading);
}

.font-vintage-modern {
  font-family: var(--font-vintage-modern);
}

.font-old-english {
  font-family: var(--font-old-english);
}

.font-old-standard {
  font-family: var(--font-body);
}

.font-zenaida {
  font-family: var(--font-zenaida);
}

p,
li,
blockquote,
figcaption,
label,
input,
textarea,
select,
button,
table {
  font-family: var(--font-body);
}

    .site-cover {
      width: 100%;
      margin: 0;
      padding: 0;
    }

    .site-cover img {
      display: block;
      width: 100%;
      height: auto;
      margin: 0;
      padding: 0;
    }

    main {
  min-height: 140vh;
  width: 100%;
  padding: 25px 0;

  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 25px;
}

.parchment {
  width: 95vw;

  padding:
    clamp(2rem, 4vw, 3.5rem)
    clamp(2.5rem, 6vw, 6rem);

  background-image: url("assets/parchment-box.png");
  background-repeat: no-repeat;
  background-position: center;
  background-size: 135% 100%;

  color: #4c2818;
  overflow-wrap: break-word;
}

.parchment > :first-child {
  margin-top: 0;
}

.parchment > :last-child {
  margin-bottom: 0;
}

.parchment img,
.parchment video,
.parchment iframe {
  max-width: 100%;
  height: auto;
}

@media (max-width: 700px) {
  .parchment {
    width: 95vw;

    padding:
      2rem
      clamp(1.75rem, 8vw, 3rem);

    background-size: 150% 100%;
  }
}
  </style>
</head>

<body>
  <header class="site-cover">
    <img
      src="assets/cover.png"
      alt="Zuhaib Syed — Welcome to my website"
    >
  </header>

  <main>
  <div class="parchment">
    <h1>Welcome to My Website</h1>

    <p>
      This is ordinary HTML placed directly inside a div.
      The parchment image is only the background.
    </p>
  </div>

  <div class="parchment">
    <h2>Another Parchment</h2>

    <p>
      This parchment automatically becomes taller when more text
      is added.
    </p>

    <p>
      You can put headings, paragraphs, images, lists, links, and
      other HTML inside it.
    </p>
  </div>
</main>
</body>
</html>
